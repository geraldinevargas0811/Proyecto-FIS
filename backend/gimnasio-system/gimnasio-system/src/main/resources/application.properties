
# ===============================
# DATASOURCE - PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/gimnasio_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING
# ===============================
logging.level.com.gimnasio=DEBUG
logging.level.org.springframework.security=INFO

# ===============================
# MULTIPART (subida de archivos)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.main.allow-circular-references=true

# ===============================
# JWT
# ===============================
app.demo.enabled=true

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-this-value-before-production-please-keep-it-long}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

